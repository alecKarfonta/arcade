apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: arcade
    app.kubernetes.io/name: arcade
    app.kubernetes.io/part-of: arcade
    app.kubernetes.io/managed-by: system-deploy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: arcade
  template:
    metadata:
      labels:
        app: arcade
        app.kubernetes.io/name: arcade
        app.kubernetes.io/part-of: arcade
        app.kubernetes.io/managed-by: system-deploy
    spec:
      containers:
        - name: app
          image: ghcr.io/aleckarfonta/arcade:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 31021
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
