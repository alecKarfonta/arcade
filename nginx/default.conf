# Stockastic Arcade catalog — static HTML/CSS/ES modules.

server {
    listen 31021 default_server;
    listen [::]:31021 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html html;
        text/css css;
        text/javascript js mjs;
        application/json json;
        image/webp webp;
        image/png png;
        video/webm webm;
        video/mp4 mp4;
        text/plain txt;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|webp|png|webm|mp4)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
